<div class="hero-section">
    <div class="welcome-container">
        <h1>Welcome to Your Mini Project {{admin.firstName}}!</h1>
        <p>A secure platform to manage profile and data.</p>
    </div>
    <div class="admin-container">
        <h2>Manage Users</h2>
        
        <div class="table-responsive">
          <table class="user-table">
            <thead>
              <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let user of users">
                <td>{{ user?.firstName }}</td>
                <td>{{ user?.lastName }}</td>
                <td>{{ user?.email }}</td>
                <td>
                  <span [class]="'badge ' + user.role">{{ user?.role }}</span>
                </td>
                <td>
                  <!-- <button class="btn-edit" (click)="editUser(user)">Edit</button> -->
                  <button class="btn-delete" (click)="deleteUser(user.email)">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
</div>
